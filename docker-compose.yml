# docker-compose.yml 

services:
  db:
    image: postgres:14-alpine
    ports:
      - "5433:5432" 
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d matrix_solver"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Сервіс Redis (для Celery)
  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"  # <--- ДОДАЙТЕ ЦЕЙ РЯДОК

  # 3. Сервіс Backend (FastAPI)
  backend:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      replicas: 4
      
  # 4. Сервіс Worker (Celery)
  worker:
    build: .
    command: celery -A backend.app.celery_app worker --loglevel=info --autoscale=4,1 -Ofair
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      replicas: 1

  # 5. Сервіс Nginx
  nginx:
    image: nginx:1.21-alpine
    ports:
      - "80:80" 
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/var/www/frontend

    depends_on:
      - backend

volumes:
  pg_data: